version: '3.8'

services:
  # Node.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: real-estate-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/real-estate
      JWT_SECRET: dev-secret-key-change-in-production
    depends_on:
      - mongo
      - redis
    volumes:
      - ./src:/app/src
    networks:
      - real-estate-network
    restart: unless-stopped

  # MongoDB Database
  mongo:
    image: mongo:7.0-alpine
    container_name: real-estate-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: real-estate
    volumes:
      - mongo_data:/data/db
    networks:
      - real-estate-network
    restart: unless-stopped

  # Mongo Express (MongoDB GUI)
  mongo-express:
    image: mongo-express:1.0.0
    container_name: real-estate-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongo
    networks:
      - real-estate-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: real-estate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - real-estate-network
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:

networks:
  real-estate-network:
    driver: bridge
